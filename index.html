<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KOM Checklist</title>
  <link rel="stylesheet" href="style.css" />
</head>
  <!-- MODAL: Richiedi (mock) -->
<div id="requestModal" class="modal hidden" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h3 id="modalTitle">Invia reminder (mock)</h3>
      <button id="modalClose" type="button" class="modal-close">Chiudi</button>
    </div>

    <div class="modal-body">
      <div class="modal-row">
        <div class="modal-label">Item</div>
        <div id="modalItemText" class="modal-value"></div>
      </div>

      <div class="modal-row">
        <label class="modal-label" for="modalEmail">Email destinatario</label>
        <input id="modalEmail" type="email" placeholder="nome.cognome@azienda.com" />
        <div id="modalEmailError" class="modal-error hidden">Inserisci un indirizzo email valido.</div>
      </div>

      <div class="modal-row">
        <label class="modal-label" for="modalMessage">Messaggio (standard)</label>
        <textarea id="modalMessage" rows="6"></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button id="modalSend" type="button">Invia reminder (mock)</button>
      <button id="modalCancel" type="button" class="btn-secondary">Annulla</button>
    </div>
  </div>
</div>
<body>
  <header class="header">
    <h1>Project Kick-Off Meeting (KOM) — Internal Best Practice Checklist</h1>
    <p class="sub">Mock-up: checkbox + richieste su item non completati (nessuna integrazione attiva).</p>
  </header>

  <section class="topbar">
    <section id="dashboard" class="dashboard">
  <div class="dash-top">
    <div class="dash-title">Cruscotto completamento</div>
    <div id="dashGlobal" class="dash-global">0%</div>
  </div>
  <div id="dashSections" class="dash-sections"></div>
</section>
    <button id="btnRequestMissing" type="button">Richiedi mancanti</button>
    <button id="btnExportState" type="button">Esporta stato (JSON)</button>
    <button id="btnClear" type="button">Reset flags</button>
  </section>

  <main id="checklist" class="checklist"></main>

  <footer class="footer">
    <small>Nota: lo stato è salvato in localStorage del browser.</small>
  </footer>

  <script src="script.js"></script>
</body>
</html>
